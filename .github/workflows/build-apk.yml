name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: DĂÂŠcompresser le projet (si un zip est prĂÂŠsent)
        run: |
          ZIP=$(find . -name '*.zip' -not -path '*/.git/*' | head -n1)
          if [ -n "$ZIP" ]; then
            echo "Archive trouvĂÂŠe : $ZIP Ă˘âŹâ dĂÂŠcompression..."
            unzip -o "$ZIP"
          else
            echo "Pas de zip trouvĂÂŠ, on continue avec les fichiers prĂÂŠsents."
          fi

      - name: Trouver le projet et construire l'APK
        run: |
          PKG=$(find . -name package.json -not -path '*/node_modules/*' -not -path '*/.git/*' | head -n1)
          if [ -z "$PKG" ]; then
            echo "ERREUR : aucun package.json trouvĂÂŠ. As-tu bien envoyĂÂŠ echiquier-punk.zip ?"
            exit 1
          fi
          DIR=$(dirname "$PKG")
          echo "Projet trouvĂÂŠ dans : $DIR"
          cd "$DIR"
          npm install
          npx cap add android
          npx capacitor-assets generate --android || echo "Icone personnalisee ignoree (icone par defaut conservee)."
          npx cap sync android
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: echiquier-punk-apk
          path: '**/app-debug.apk'
