name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Dรยฉcompresser le projet (si un zip est prรยฉsent)
        run: |
          ZIP=$(find . -name '*.zip' -not -path '*/.git/*' | head -n1)
          if [ -n "$ZIP" ]; then
            echo "Archive trouvรยฉe : $ZIP รขโฌโ dรยฉcompression..."
            unzip -o "$ZIP"
          else
            echo "Pas de zip trouvรยฉ, on continue avec les fichiers prรยฉsents."
          fi

      - name: Trouver le projet et construire l'APK
        run: |
          PKG=$(find . -name package.json -not -path '*/node_modules/*' -not -path '*/.git/*' | head -n1)
          if [ -z "$PKG" ]; then
            echo "=========================================================="
            echo " ERREUR : aucun package.json trouvรยฉ dans le dรยฉpรยดt."
            echo " As-tu bien envoyรยฉ le fichier echiquier-punk.zip dans le dรยฉpรยดt ?"
            echo "=========================================================="
            exit 1
          fi
          DIR=$(dirname "$PKG")
          echo "Projet trouvรยฉ dans : $DIR"
          cd "$DIR"
          npm install
          npx cap add android
          npx cap sync android
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: echiquier-punk-apk
          path: '**/app-debug.apk'
