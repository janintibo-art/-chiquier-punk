name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Trouver le projet et construire l'APK
        run: |
          # cherche le dossier qui contient package.json (oÃ¹ qu'il soit)
          DIR=$(dirname "$(find . -name package.json -not -path '*/node_modules/*' | head -n1)")
          echo "Projet trouvÃ© dans : $DIR"
          cd "$DIR"
          npm install
          npx cap add android
          npx cap sync android
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: echiquier-punk-apk
          path: '**/app-debug.apk'
